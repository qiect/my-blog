name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.125.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Replace Gitalk secrets
        run: |
          sed -i 's/{{ GITALK_CLIENT_ID }}/${{ secrets.GITALK_CLIENT_ID }}/g' config.toml
          sed -i 's/{{ GITALK_CLIENT_SECRET }}/${{ secrets.GITALK_CLIENT_SECRET }}/g' config.toml

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-to-server:
    name: Deploy to Aliyun Server (Docker)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./artifact

      - name: Extract artifact
        run: |
          mkdir -p public
          cd artifact
          if [ -f artifact.tar ]; then
            tar -xf artifact.tar -C ../public/
          else
            cp -r * ../public/ 2>/dev/null || true
          fi
          cd ..

      - name: Prepare Docker build context
        run: |
          cp Dockerfile public/
          cp nginx.conf public/

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 39.107.53.196
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # 停止并删除旧容器
            sudo docker stop myblog 2>/dev/null || true
            sudo docker rm myblog 2>/dev/null || true
            sudo docker rmi myblog:latest 2>/dev/null || true
            
            # 清理旧文件
            rm -rf /tmp/myblog
            mkdir -p /tmp/myblog

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 39.107.53.196
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "public/*"
          target: "/tmp/myblog"
          strip_components: 1

      - name: Build and run Docker container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 39.107.53.196
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /tmp/myblog
            
            # 构建 Docker 镜像
            sudo docker build -t myblog:latest .
            
            # 运行容器，映射到 8000 端口
            sudo docker run -d \
              --name myblog \
              --restart always \
              -p 8000:80 \
              myblog:latest
            
            echo "Blog deployed successfully on port 8000!"
