baseURL = "https://qiect.github.io/my-blog/"
languageCode = "zh-cn"
title = "我的博客"
theme = "github-style"
pygmentsCodeFences = true
pygmentsUseClasses = true

[params]
  author = "Chet"
  description = "AI驱动全栈开发工程师"
  github = "qiect"
  email = "qctvip@vip.163.com"
  url = "https://chetapp.top/"
  keywords = ".Net, AI"
  rss = true
  lastmod = true
  favicon = "/my-blog/images/avatar.png"
  avatar = "/my-blog/images/avatar.png"
  headerIcon = "/my-blog/images/github-mark-white.png"
  location = "China"
  userStatusEmoji = "👋"
  enableGitalk = true
  enableSearch = true

  [params.gitalk]
    clientID = "{{ GITALK_CLIENT_ID }}"
    clientSecret = "{{ GITALK_CLIENT_SECRET }}"
    repo = "my-blog"
    owner = "qiect"
    admin = "qiect"
    id = "location.pathname"
    labels = "gitalk"
    perPage = 15
    pagerDirection = "last"
    createIssueManually = true
    distractionFreeMode = false

  [[params.links]]
    title = "GitHub"
    href = "https://github.com/qiect"

[frontmatter]
  lastmod = ["lastmod", ":fileModTime", ":default"]

[outputs]
  home = ["html", "json", "RSS"]

[outputFormats.json]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = false

[services]
  [services.googleAnalytics]
    ID = ""
